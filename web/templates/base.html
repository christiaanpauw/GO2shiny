<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
  <title>NZ Trade Intelligence Dashboard</title>
  <!-- Tabler CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css"/>
  <!-- Tabulator (data tables) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabulator-tables@6/dist/css/tabulator_bootstrap5.min.css"/>
  <!-- Custom overrides -->
  <link rel="stylesheet" href="/static/css/app.css"/>
  <!-- Alpine.js (filter state) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body class="antialiased">
  <div class="wrapper">

    <!-- Sidebar -->
    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <h1 class="navbar-brand navbar-brand-autodark">
          <a href="/">
            <span class="navbar-brand-text">NZ Trade</span>
          </a>
        </h1>
        <div class="collapse navbar-collapse" id="navbar-menu">
          <ul class="navbar-nav pt-lg-3">
            <li class="nav-item">
              <a class="nav-link" href="/dashboard">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24"
                       stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M5 12l-2 0l9 -9l9 9l-2 0"/>
                    <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/>
                    <path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/>
                  </svg>
                </span>
                <span class="nav-link-title">Dashboard</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/market">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24"
                       stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M3 3l0 18l18 0"/>
                    <path d="M7 16l4 -4l4 4l4 -8"/>
                  </svg>
                </span>
                <span class="nav-link-title">Market Intelligence</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/commodity-intelligence">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24"
                       stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M12 3l8 4.5l0 9l-8 4.5l-8 -4.5l0 -9l8 -4.5"/>
                    <path d="M12 12l8 -4.5"/>
                    <path d="M12 12l0 9"/>
                    <path d="M12 12l-8 -4.5"/>
                  </svg>
                </span>
                <span class="nav-link-title">Commodity Intelligence</span>
              </a>
            </li>
          </ul>

          <!-- Sidebar filters -->
          <div class="mt-3" id="sidebar-filters"
               x-data="filterState()"
               x-init="initFromURL()">

            <h6 class="navbar-heading text-muted text-uppercase px-0">Filters</h6>

            <!-- Hidden form fields included by HTMX hx-include -->
            <form id="filter-form" style="display:none">
              <input type="hidden" name="year_from" :value="yearFrom">
              <input type="hidden" name="year_to"   :value="yearTo">
              <input type="hidden" name="type_ie"   :value="typeIE">
              <input type="hidden" name="type_gs"   :value="typeGS">
            </form>

            <!-- Year From -->
            <div class="mb-2">
              <label class="form-label text-white-50 small mb-1">Year From</label>
              <input type="number" class="form-control form-control-sm"
                     x-model.number="yearFrom" min="1990" :max="yearTo"
                     @change="onFilterChange()">
            </div>

            <!-- Year To -->
            <div class="mb-2">
              <label class="form-label text-white-50 small mb-1">Year To</label>
              <input type="number" class="form-control form-control-sm"
                     x-model.number="yearTo" :min="yearFrom" max="2099"
                     @change="onFilterChange()">
            </div>

            <!-- Direction -->
            <div class="mb-2">
              <label class="form-label text-white-50 small mb-1">Direction</label>
              <select class="form-select form-select-sm"
                      x-model="typeIE" @change="onFilterChange()">
                <option value="">Both</option>
                <option value="Exports">Exports</option>
                <option value="Imports">Imports</option>
              </select>
            </div>

            <!-- Type -->
            <div class="mb-2">
              <label class="form-label text-white-50 small mb-1">Type</label>
              <select class="form-select form-select-sm"
                      x-model="typeGS" @change="onFilterChange()">
                <option value="">Total</option>
                <option value="Goods">Goods</option>
                <option value="Services">Services</option>
              </select>
            </div>

          </div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <div class="page-wrapper">

      <!-- Header -->
      <div class="page-header d-print-none">
        <div class="container-xl">
          <div class="row g-2 align-items-center">
            <div class="col">
              <h2 class="page-title">NZ Trade Intelligence Dashboard</h2>
            </div>
          </div>
        </div>
      </div>

      <!-- Content block -->
      <div class="page-body">
        <div class="container-xl">
          {{block "content" .}}
          <!-- page content goes here -->
          {{end}}
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer footer-transparent d-print-none">
        <div class="container-xl">
          <div class="row text-center align-items-center flex-row-reverse">
            <div class="col-lg-auto ms-lg-auto">
              <ul class="list-inline list-inline-dots mb-0">
                <li class="list-inline-item">
                  NZ Trade Intelligence Dashboard &copy; {{.Year}}
                </li>
              </ul>
            </div>
          </div>
        </div>
      </footer>

    </div><!-- /page-wrapper -->
  </div><!-- /wrapper -->

  <!-- HTMX -->
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <!-- Tabler JS -->
  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
  <!-- Apache ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <!-- Tabulator (data tables) -->
  <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6/dist/js/tabulator.min.js"></script>
  <!-- Custom chart helpers -->
  <script src="/static/js/charts.js"></script>
  <!-- Custom table helpers -->
  <script src="/static/js/tables.js"></script>
  <!-- Alpine.js filter state -->
  <script>
  function filterState() {
    return {
      yearFrom: 1990,
      yearTo:   new Date().getFullYear(),
      typeIE:   '',
      typeGS:   '',

      initFromURL() {
        const p = new URLSearchParams(window.location.search);
        if (p.get('year_from')) this.yearFrom = parseInt(p.get('year_from'));
        if (p.get('year_to'))   this.yearTo   = parseInt(p.get('year_to'));
        if (p.get('type_ie'))   this.typeIE   = p.get('type_ie');
        if (p.get('type_gs'))   this.typeGS   = p.get('type_gs');
      },

      onFilterChange() {
        const p = new URLSearchParams();
        p.set('year_from', this.yearFrom);
        p.set('year_to',   this.yearTo);
        if (this.typeIE) p.set('type_ie', this.typeIE);
        if (this.typeGS) p.set('type_gs', this.typeGS);
        history.pushState({}, '', '?' + p.toString());

        document.dispatchEvent(new CustomEvent('filter-changed', {
          detail: {
            year_from: this.yearFrom,
            year_to:   this.yearTo,
            type_ie:   this.typeIE,
            type_gs:   this.typeGS,
          }
        }));

        document.querySelectorAll('[hx-include="#filter-form"]').forEach(function(el) {
          if (window.htmx) htmx.trigger(el, 'filter-changed');
        });
      },
    };
  }
  </script>
</body>
</html>
