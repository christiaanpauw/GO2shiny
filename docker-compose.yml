x-db-url: &db-url postgres://go2shiny:go2shiny@db:5432/go2shiny?sslmode=disable

services:

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: go2shiny
      POSTGRES_USER: go2shiny
      POSTGRES_PASSWORD: go2shiny
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U go2shiny -d go2shiny"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: *db-url
    # Use shell form so $DATABASE_URL is expanded at runtime.
    entrypoint: ["sh", "-c", "goose -dir /migrations postgres $$DATABASE_URL up"]
    restart: on-failure

  import_data:
    build:
      context: .
      target: importer
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: *db-url
    restart: on-failure

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      import_data:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Override DATABASE_URL so it uses the Compose service name.
      DATABASE_URL: *db-url
    ports:
      - "8009:8080"
